// ═══════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════
const GOAL_TIER = "MASTER";
const GOAL_RANK = "";
const DEADLINE = new Date("2026-05-31T23:59:59");
const START_DATE = new Date("2026-04-15T00:00:00");
const REFRESH_INTERVAL = 3 * 60 * 1000; // 3 min

const TIER_BASE = {
  "IRON IV":0,"IRON III":100,"IRON II":200,"IRON I":300,
  "BRONZE IV":400,"BRONZE III":500,"BRONZE II":600,"BRONZE I":700,
  "SILVER IV":800,"SILVER III":900,"SILVER II":1000,"SILVER I":1100,
  "GOLD IV":1200,"GOLD III":1300,"GOLD II":1400,"GOLD I":1500,
  "PLATINUM IV":1600,"PLATINUM III":1700,"PLATINUM II":1800,"PLATINUM I":1900,
  "EMERALD IV":2000,"EMERALD III":2100,"EMERALD II":2200,"EMERALD I":2300,
  "DIAMOND IV":2400,"DIAMOND III":2500,"DIAMOND II":2600,"DIAMOND I":2700,
  "MASTER":2800,"GRANDMASTER":3200,"CHALLENGER":3600,
};

function absLP(tier, rank, lp) {
  const key = rank ? `${tier} ${rank}` : tier;
  return (TIER_BASE[key] || 0) + (lp || 0);
}

function tierFromAbs(abs) {
  const entries = Object.entries(TIER_BASE).sort((a,b) => b[1] - a[1]);
  for (const [key, base] of entries) {
    if (abs >= base) {
      const lp = abs - base;
      const parts = key.split(' ');
      return { tier: parts[0], rank: parts[1] || '', lp, label: parts[1] ? `${parts[0]} ${parts[1]} ${lp} LP` : `${parts[0]} ${lp} LP` };
    }
  }
  return { tier: 'IRON', rank: 'IV', lp: 0, label: 'IRON IV 0 LP' };
}

const MASTER_ABS = 2800;
const ROLE_NAMES = { TOP:'Top', JUNGLE:'Jungle', MIDDLE:'Mid', BOTTOM:'Bot', UTILITY:'Support', UNKNOWN:'?' };
const CHAMP_DISPLAY = { TahmKench:"Tahm Kench", DrMundo:"Dr. Mundo", Ksante:"K'Sante", AurelionSol:"Aurelion Sol", TwistedFate:"Twisted Fate", MissFortune:"Miss Fortune", MasterYi:"Master Yi", JarvanIV:"Jarvan IV", LeeSin:"Lee Sin", XinZhao:"Xin Zhao", RekSai:"Rek'Sai", KhaZix:"Kha'Zix", ChoGath:"Cho'Gath", KogMaw:"Kog'Maw", VelKoz:"Vel'Koz", BelVeth:"Bel'Veth", Zaahen:"Zaheen" };

function fmtChamp(name) { return CHAMP_DISPLAY[name] || name; }

function daysUntil(target) {
  const ms = Math.max(0, target - new Date());
  return {
    days: Math.floor(ms / 86400000),
    hours: Math.floor((ms % 86400000) / 3600000),
    minutes: Math.floor((ms % 3600000) / 60000),
    seconds: Math.floor((ms % 60000) / 1000),
  };
}

function useCountdown(target) {
  const [v, setV] = React.useState(() => daysUntil(target));
  React.useEffect(() => {
    const t = setInterval(() => setV(daysUntil(target)), 1000);
    return () => clearInterval(t);
  }, [target]);
  return v;
}

// ═══════════════════════════════════════════════════════════════
// LIVE DATA HOOK
// ═══════════════════════════════════════════════════════════════
function useLiveData() {
  const [data, setData] = React.useState(null);
  const [error, setError] = React.useState(null);
  const [lastUpdate, setLastUpdate] = React.useState(null);

  const fetchData = React.useCallback(async () => {
    try {
      const res = await fetch('data.json?t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      setData(json);
      setError(null);
      setLastUpdate(new Date());
      try { localStorage.setItem('ds-cache', JSON.stringify(json)); } catch {}
    } catch (err) {
      setError(err.message);
      if (!data) {
        try {
          const cached = localStorage.getItem('ds-cache');
          if (cached) { setData(JSON.parse(cached)); setLastUpdate(new Date()); }
        } catch {}
      }
    }
  }, []);

  React.useEffect(() => {
    fetchData();
    const t = setInterval(fetchData, REFRESH_INTERVAL);
    return () => clearInterval(t);
  }, [fetchData]);

  return { data, error, lastUpdate, refresh: fetchData };
}

// ═══════════════════════════════════════════════════════════════
// PROCESS DATA
// ═══════════════════════════════════════════════════════════════
function processData(raw) {
  const rank = raw.rank;
  const currentAbs = rank ? absLP(rank.tier, rank.rank, rank.lp) : 0;
  const startAbs = absLP("EMERALD", "II", 0);
  const progressPct = Math.min(100, Math.max(0, (currentAbs - startAbs) / (MASTER_ABS - startAbs) * 100));
  const lpToMaster = Math.max(0, MASTER_ABS - currentAbs);

  const matches = raw.matches || [];
  // Use season totals from API (all games, not just last 24)
  const seasonWins = rank ? rank.wins : 0;
  const seasonLosses = rank ? rank.losses : 0;
  const seasonGames = seasonWins + seasonLosses;
  const totalWR = seasonGames ? Math.round(seasonWins / seasonGames * 100) : 0;
  const totalWins = seasonWins;
  const totalGames = seasonGames;

  // Streak
  let streakCount = 0;
  const streakType = matches[0]?.result || 'W';
  for (const m of matches) {
    if (m.result === streakType) streakCount++;
    else break;
  }

  // Champ stats
  const champMap = {};
  for (const m of matches) {
    if (!champMap[m.champ]) champMap[m.champ] = { name: m.champ, games: 0, wins: 0, k: 0, d: 0, a: 0, lp: 0 };
    const s = champMap[m.champ];
    s.games++;
    if (m.result === 'W') s.wins++;
    s.k += m.kills; s.d += m.deaths; s.a += m.assists;
  }
  const champStats = Object.values(champMap).map(s => ({
    ...s,
    wr: Math.round(s.wins / s.games * 100),
    kda: ((s.k + s.a) / Math.max(1, s.d)).toFixed(2),
  })).sort((a, b) => b.games - a.games);

  // MVP (most games champ with highest WR)
  const mvp = champStats.filter(c => c.games >= 2).sort((a, b) => b.wr - a.wr || b.games - a.games)[0] || champStats[0];

  // Role stats
  const roleMap = {};
  for (const m of matches) {
    const r = m.role || 'UNKNOWN';
    if (!roleMap[r]) roleMap[r] = { role: r, games: 0, wins: 0 };
    roleMap[r].games++;
    if (m.result === 'W') roleMap[r].wins++;
  }
  const mainRole = Object.values(roleMap).sort((a, b) => b.games - a.games)[0];

  // Milestones
  const milestones = [
    { tier: "EMERALD II", abs: absLP("EMERALD","II",0) },
    { tier: "EMERALD I",  abs: absLP("EMERALD","I",0) },
    { tier: "DIAMOND IV", abs: absLP("DIAMOND","IV",0) },
    { tier: "DIAMOND III",abs: absLP("DIAMOND","III",0) },
    { tier: "DIAMOND II", abs: absLP("DIAMOND","II",0) },
    { tier: "DIAMOND I",  abs: absLP("DIAMOND","I",0) },
    { tier: "MASTER",     abs: MASTER_ABS },
  ].map(m => ({
    ...m,
    status: currentAbs >= m.abs ? (m.abs === MASTER_ABS ? 'goal' : 'done') : 'future',
  }));
  // Mark current
  const lastDone = milestones.filter(m => m.status === 'done').pop();
  if (lastDone && !milestones.some(m => m.status === 'goal' && currentAbs >= m.abs)) {
    lastDone.status = 'current';
  }
  if (currentAbs >= MASTER_ABS) {
    milestones[milestones.length - 1].status = 'goal';
  }

  const avgKDA = totalGames ? ((matches.reduce((s,m)=>s+m.kills,0) + matches.reduce((s,m)=>s+m.assists,0)) / Math.max(1, matches.reduce((s,m)=>s+m.deaths,0))).toFixed(2) : '0.00';

  return {
    rank, currentAbs, startAbs, progressPct, lpToMaster,
    matches, totalGames, totalWins, totalWR,
    streakCount, streakType, champStats, mvp, mainRole,
    milestones, avgKDA,
  };
}

function useTweaks(defaults) {
  const stored = React.useMemo(() => {
    try { const s=localStorage.getItem('ds-tweaks'); return s?{...defaults,...JSON.parse(s)}:defaults; } catch { return defaults; }
  }, []);
  const [values, setValues] = React.useState(stored);
  const setTweak = React.useCallback((k, v) => {
    const edits = typeof k === 'object' ? k : { [k]: v };
    setValues(prev => { const next={...prev,...edits}; try{localStorage.setItem('ds-tweaks',JSON.stringify(next))}catch{} return next; });
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title='Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x:16, y:16 });
  const clamp = React.useCallback(() => {
    const p=dragRef.current; if(!p) return;
    offsetRef.current = { x:Math.min(Math.max(16,offsetRef.current.x),window.innerWidth-p.offsetWidth-16), y:Math.min(Math.max(16,offsetRef.current.y),window.innerHeight-p.offsetHeight-16) };
    p.style.right=offsetRef.current.x+'px'; p.style.bottom=offsetRef.current.y+'px';
  },[]);
  React.useEffect(()=>{ if(!open)return; clamp(); const ro=new ResizeObserver(clamp); ro.observe(document.documentElement); return ()=>ro.disconnect(); },[open,clamp]);
  const onDrag = (e) => { const p=dragRef.current; if(!p)return; const r=p.getBoundingClientRect(),sx=e.clientX,sy=e.clientY,sr=window.innerWidth-r.right,sb=window.innerHeight-r.bottom; const mv=(ev)=>{offsetRef.current={x:sr-(ev.clientX-sx),y:sb-(ev.clientY-sy)};clamp();}; const up=()=>{window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);}; window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up); };
  return (<><style>{__TWEAKS_STYLE}</style>{!open&&<button className="twk-fab" onClick={()=>setOpen(true)} title="Tweaks">{"\u2699"}</button>}{open&&<div ref={dragRef} className="twk-panel" style={{right:offsetRef.current.x,bottom:offsetRef.current.y}}><div className="twk-hd" onMouseDown={onDrag}><b>{title}</b><button className="twk-x" onMouseDown={e=>e.stopPropagation()} onClick={()=>setOpen(false)}>{"\u2715"}</button></div><div className="twk-body">{children}</div></div>}</>);

// ═══════════════════════════════════════════════════════════════
// EPIC PARTICLE ARENA — anime power-up energy effects
// ═══════════════════════════════════════════════════════════════
function EpicParticleArena({ palette }) {
  const canvasRef = React.useRef(null);

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let raf, t = 0;

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = canvas.offsetWidth * dpr;
      canvas.height = canvas.offsetHeight * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    const W = () => canvas.offsetWidth;
    const H = () => canvas.offsetHeight;

    // Particle pool
    const particles = [];
    const trails = [];
    const slashes = [];
    const rings = [];

    // Spawn energy orbs from center
    function spawnOrbs(cx, cy) {
      const colors = [palette.primary, palette.secondary, palette.tertiary, '#fff'];
      for (let i = 0; i < 3; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 3;
        particles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 1,
          size: 2 + Math.random() * 4,
          life: 1,
          decay: 0.008 + Math.random() * 0.012,
          color: colors[Math.floor(Math.random() * colors.length)],
          type: 'orb',
        });
      }
    }

    // Spawn rising sparks (embers floating up)
    function spawnEmbers() {
      const w = W();
      particles.push({
        x: Math.random() * w,
        y: H() + 5,
        vx: (Math.random() - 0.5) * 0.5,
        vy: -0.5 - Math.random() * 1.5,
        size: 1 + Math.random() * 2.5,
        life: 1,
        decay: 0.004 + Math.random() * 0.004,
        color: [palette.primary, palette.secondary, palette.tertiary][Math.floor(Math.random() * 3)],
        type: 'ember',
      });
    }

    // Spawn a slash trail (like sword cut)
    function spawnSlash() {
      const w = W(), h = H();
      const startX = Math.random() * w;
      const startY = 10 + Math.random() * (h - 20);
      const angle = -0.8 + Math.random() * 1.6;
      const len = 80 + Math.random() * 160;
      slashes.push({
        x: startX, y: startY,
        angle,
        len,
        life: 1,
        decay: 0.025,
        color: [palette.primary, palette.secondary, palette.tertiary][Math.floor(Math.random() * 3)],
        width: 2 + Math.random() * 3,
      });
    }

    // Energy ring pulse from center
    function spawnRing() {
      const w = W(), h = H();
      rings.push({
        x: w * (0.3 + Math.random() * 0.4),
        y: h * (0.3 + Math.random() * 0.4),
        radius: 0,
        maxRadius: 60 + Math.random() * 80,
        life: 1,
        decay: 0.015,
        color: [palette.primary, palette.secondary][Math.floor(Math.random() * 2)],
      });
    }

    let lastSlash = 0, lastRing = 0, lastBurst = 0;

    function animate() {
      t += 0.016;
      const w = W(), h = H();
      ctx.clearRect(0, 0, w, h);

      // Background glow (center energy source)
      const cx = w / 2, cy = h / 2;
      const pulseSize = 80 + Math.sin(t * 2) * 30;
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, pulseSize);
      grad.addColorStop(0, palette.primary + '18');
      grad.addColorStop(0.5, palette.secondary + '08');
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);

      // Spawn embers continuously
      if (Math.random() < 0.3) spawnEmbers();

      // Periodic energy burst from center
      if (t - lastBurst > 2 + Math.random() * 3) {
        for (let i = 0; i < 20; i++) spawnOrbs(cx, cy);
        lastBurst = t;
      }

      // Periodic slash
      if (t - lastSlash > 1.5 + Math.random() * 2) {
        spawnSlash();
        lastSlash = t;
      }

      // Periodic ring
      if (t - lastRing > 3 + Math.random() * 4) {
        spawnRing();
        lastRing = t;
      }

      // Draw & update slashes
      for (let i = slashes.length - 1; i >= 0; i--) {
        const s = slashes[i];
        s.life -= s.decay;
        if (s.life <= 0) { slashes.splice(i, 1); continue; }
        ctx.save();
        ctx.globalAlpha = s.life * s.life;
        ctx.translate(s.x, s.y);
        ctx.rotate(s.angle);
        // Slash gradient
        const slashGrad = ctx.createLinearGradient(-s.len / 2, 0, s.len / 2, 0);
        slashGrad.addColorStop(0, 'transparent');
        slashGrad.addColorStop(0.3, s.color);
        slashGrad.addColorStop(0.5, '#fff');
        slashGrad.addColorStop(0.7, s.color);
        slashGrad.addColorStop(1, 'transparent');
        ctx.strokeStyle = slashGrad;
        ctx.lineWidth = s.width * s.life;
        ctx.shadowColor = s.color;
        ctx.shadowBlur = 20 * s.life;
        ctx.beginPath();
        ctx.moveTo(-s.len / 2, 0);
        ctx.lineTo(s.len / 2, 0);
        ctx.stroke();
        ctx.restore();
      }

      // Draw & update rings
      for (let i = rings.length - 1; i >= 0; i--) {
        const r = rings[i];
        r.life -= r.decay;
        r.radius += (r.maxRadius - r.radius) * 0.08;
        if (r.life <= 0) { rings.splice(i, 1); continue; }
        ctx.save();
        ctx.globalAlpha = r.life * 0.6;
        ctx.strokeStyle = r.color;
        ctx.lineWidth = 2 * r.life;
        ctx.shadowColor = r.color;
        ctx.shadowBlur = 15 * r.life;
        ctx.beginPath();
        ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      // Draw & update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= p.decay;
        if (p.type === 'orb') {
          p.vx *= 0.98;
          p.vy *= 0.98;
        }
        if (p.life <= 0 || p.y < -10) { particles.splice(i, 1); continue; }
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = p.size * 4;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
        // Bright core
        if (p.size > 3) {
          ctx.globalAlpha = p.life * 0.8;
          ctx.fillStyle = '#fff';
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life * 0.3, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      raf = requestAnimationFrame(animate);
    }

    raf = requestAnimationFrame(animate);
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
  }, [palette]);

  return (
    <div style={{ width: '100%', height: '100px', marginBottom: '16px', position: 'relative', opacity: 0.85 }}>
      <canvas ref={canvasRef} style={{ width: '100%', height: '100%', display: 'block' }}/>
    </div>
  );
}

function FloatingParticles({ palette }) {
  const particles = React.useMemo(() =>
    Array.from({ length: 18 }, (_, i) => ({
      id: i, left: Math.random() * 100, delay: Math.random() * 12,
      dur: 10 + Math.random() * 10, size: 2 + Math.random() * 3,
      drift: (Math.random() - 0.5) * 80,

  return (
    <div style={{ position: 'fixed', inset: 0, pointerEvents: 'none', zIndex: 0, overflow: 'hidden' }}>

function DSChart({palette,intensity,d}){
  // Build LP curve from matches (oldest to newest)
  const ordered=[...d.matches].reverse();
  const startAbs=absLP("EMERALD","II",62);
  // We don't have LP per match from API, so show rank progression
  const data=[{abs:startAbs,label:'Start'}];
  // Current position
  data.push({abs:d.currentAbs,label:d.rank?`${d.rank.tier} ${d.rank.rank} ${d.rank.lp}LP`:'Current'});

  const W=720,H=200,PAD={l:50,r:16,t:16,b:24};
  const min=Math.min(startAbs,d.currentAbs)-50;
  const max=MASTER_ABS+50;
  const xs=i=>PAD.l+(i/(data.length-1))*(W-PAD.l-PAD.r);
  const ys=v=>PAD.t+(1-(v-min)/(max-min))*(H-PAD.t-PAD.b);

  // Build curve from match results (approximate LP changes)
  const curveData = [];
  let runningAbs = startAbs;
  curveData.push({ abs: runningAbs, label: 'Start', idx: 0 });
  for (let i = ordered.length - 1; i >= 0; i--) {
    const m = ordered[i];
    runningAbs += m.result === 'W' ? 21 : -17; // approximate LP delta
    curveData.push({ abs: runningAbs, label: `${fmtChamp(m.champ)} ${m.result}`, result: m.result, idx: ordered.length - i });
  }
  // Snap last point to actual rank
  if (curveData.length > 1) curveData[curveData.length-1].abs = d.currentAbs;

  const cMin = Math.min(...curveData.map(p=>p.abs)) - 30;
  const cMax = MASTER_ABS + 30;
  const cxs = i => PAD.l + (i / (curveData.length - 1)) * (W - PAD.l - PAD.r);
  const cys = v => PAD.t + (1 - (v - cMin) / (cMax - cMin)) * (H - PAD.t - PAD.b);
  const path = curveData.map((p,i) => `${i===0?'M':'L'}${cxs(i).toFixed(1)},${cys(p.abs).toFixed(1)}`).join(' ');

  const [hover,setHover]=React.useState(null);

  return(
    <div style={{position:'relative'}}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto'}}>
        <defs>
          <pattern id="anHatchDark" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="3" height="6" fill={palette.secondary} opacity="0.35"/></pattern>
          <filter id="darkGlow"><feGaussianBlur stdDeviation="2.5"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        {[absLP("EMERALD","I",0),absLP("DIAMOND","IV",0),absLP("DIAMOND","II",0),MASTER_ABS].map((v,i)=>(
          <g key={i}><line x1={PAD.l} x2={W-PAD.r} y1={cys(v)} y2={cys(v)} stroke={v===MASTER_ABS?palette.primary:D_DIM} strokeWidth={v===MASTER_ABS?2:0.8} strokeDasharray={v===MASTER_ABS?'0':'3 5'}/><text x={PAD.l-6} y={cys(v)+3} textAnchor="end" style={{fontFamily:'Bangers',fontSize:'11px',fill:v===MASTER_ABS?palette.primary:D_LINE}}>{v===absLP("EMERALD","I",0)?'E1':v===absLP("DIAMOND","IV",0)?'D4':v===absLP("DIAMOND","II",0)?'D2':v===MASTER_ABS?'\u2605 MAS':''}</text></g>
        ))}
        <path d={`${path} L${cxs(curveData.length-1)},${H-PAD.b} L${cxs(0)},${H-PAD.b} Z`} fill="url(#anHatchDark)"/>
        <path d={path} stroke={D_LINE} strokeWidth="3.5" fill="none" strokeLinejoin="round"/>
        <path d={path} stroke={palette.primary} strokeWidth="2" fill="none" strokeLinejoin="round" filter="url(#darkGlow)"/>
        {curveData.map((p,i)=>(
          <g key={i} style={{cursor:'pointer'}} onMouseEnter={()=>setHover(i)} onMouseLeave={()=>setHover(null)}>
            <circle cx={cxs(i)} cy={cys(p.abs)} r="14" fill="transparent"/>
            <circle cx={cxs(i)} cy={cys(p.abs)} r={hover===i?8:(i===curveData.length-1?7:3.5)} fill={p.result==='L'?palette.primary:palette.secondary} stroke={D_LINE} strokeWidth="1.5" filter={(i===curveData.length-1||hover===i)?'url(#darkGlow)':null} style={{transition:'r .15s'}}/>
          </g>
        ))}
      </svg>
      {hover!=null&&curveData[hover]&&<div style={{position:'absolute',left:`${(cxs(hover)/W)*100}%`,top:`${(cys(curveData[hover].abs)/H)*100}%`,transform:'translate(-50%,-120%)',background:D_INK,border:`2px solid ${D_LINE}`,padding:'6px 10px',...dsBase.mono,fontSize:'11px',color:D_LINE,boxShadow:`2px 2px 0 ${D_LINE}`,pointerEvents:'none',whiteSpace:'nowrap',zIndex:10}}>{curveData[hover].label}</div>}
    </div>
  );
}

// VOTING SYSTEM
// ═══════════════════════════════════════════════════════════════
const VOTE_API = 'https://jsonblob.com/api/jsonBlob/019df399-1b79-7d73-8171-8aab681fa4f3';

function useVotes() {
  const [votes, setVotes] = React.useState(null);
  const [myVote, setMyVote] = React.useState(() => localStorage.getItem('ds-vote'));
  const [myName, setMyName] = React.useState(() => localStorage.getItem('ds-voter-name') || '');
  const [loading, setLoading] = React.useState(false);

  const fetchVotes = React.useCallback(async () => {
    try {
      const res = await fetch(VOTE_API);
      if (res.ok) setVotes(await res.json());
    } catch {}
  }, []);

  React.useEffect(() => { fetchVotes(); }, [fetchVotes]);

  const castVote = React.useCallback(async (name, vote) => {
    if (!name.trim()) return;
    setLoading(true);
    try {
      const res = await fetch(VOTE_API);
      const data = res.ok ? await res.json() : { votes: {} };
      data.votes[name.trim()] = vote;
      const entries = Object.values(data.votes);
      data.total_yes = entries.filter(v => v === 'yes').length;
      data.total_no = entries.filter(v => v === 'no').length;
      await fetch(VOTE_API, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
      setVotes(data);
      setMyVote(vote);
      setMyName(name.trim());
      localStorage.setItem('ds-vote', vote);
      localStorage.setItem('ds-voter-name', name.trim());
    } catch (err) { console.error('Vote error:', err); }
    setLoading(false);
  }, []);

  return { votes, myVote, myName, castVote, loading, refresh: fetchVotes };
}

function DSVoting({ palette, intensity, halftone }) {
  const { votes, myVote, myName, castVote, loading, refresh } = useVotes();
  const [name, setName] = React.useState(myName);
  const totalYes = votes?.total_yes || 0;
  const totalNo = votes?.total_no || 0;
  const total = totalYes + totalNo;
  const pctYes = total ? Math.round(totalYes / total * 100) : 50;
  const voters = votes?.votes ? Object.entries(votes.votes) : [];

  return (
    <MangaPanelDark accent={palette.primary} intensity={intensity} halftone={halftone} hatch style={{ padding: '22px 24px', marginBottom: '24px' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: '14px' }}>
        <div style={{ ...dsBase.display, fontSize: '26px', color: D_LINE }}>
          SCOMMESSA!! <span style={{ color: palette.primary, textShadow: `0 0 10px ${palette.primary}66` }}>CE LA FA?</span>
        </div>
        <div style={{ ...dsBase.hand, fontSize: '16px', color: palette.secondary }}>
          {total} voti
        </div>
      </div>

      {/* Bar */}
      <div style={{ height: '42px', background: D_INK, border: `3px solid ${D_LINE}`, position: 'relative', marginBottom: '14px', display: 'flex', overflow: 'hidden' }}>
        <div style={{ width: `${pctYes}%`, background: `linear-gradient(135deg, #5eff9a, #3acfff)`, display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'width .6s cubic-bezier(.3,1.4,.4,1)', minWidth: total ? '40px' : '0' }}>
          {total > 0 && <span style={{ ...dsBase.display, fontSize: '18px', color: D_INK }}>{pctYes}%</span>}
        </div>
        <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          {total > 0 && <span style={{ ...dsBase.display, fontSize: '18px', color: D_LINE }}>{100 - pctYes}%</span>}
        </div>
      </div>

      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '16px', ...dsBase.display, fontSize: '14px' }}>
        <span style={{ color: NEON_GREEN }}>{"\u2705"} CE LA FA: {totalYes}</span>
        <span style={{ color: palette.primary }}>{"\u274C"} NON CE LA FA: {totalNo}</span>
      </div>

      {/* Voter list */}
      {voters.length > 0 && (
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px', marginBottom: '16px' }}>
          {voters.map(([n, v]) => (
            <div key={n} style={{
              background: v === 'yes' ? 'rgba(94,255,154,0.15)' : 'rgba(255,46,91,0.15)',
              border: `2px solid ${v === 'yes' ? NEON_GREEN : palette.primary}`,
              padding: '4px 12px', ...dsBase.display, fontSize: '13px',
              color: v === 'yes' ? NEON_GREEN : palette.primary,
              boxShadow: `0 0 ${8 * intensity}px ${v === 'yes' ? NEON_GREEN : palette.primary}44`,
            }}>
              {n} {v === 'yes' ? '\u2705' : '\u274C'}
            </div>
          ))}
        </div>
      )}

      {/* Vote form */}
      <div style={{ background: D_INK, border: `3px solid ${D_LINE}`, padding: '14px 16px', boxShadow: `3px 3px 0 ${D_LINE}` }}>
        <div style={{ ...dsBase.display, fontSize: '14px', color: D_DIM, marginBottom: '10px', letterSpacing: '0.1em' }}>
          {myVote ? `HAI VOTATO: ${myVote === 'yes' ? 'CE LA FA' : 'NON CE LA FA'} (puoi cambiare)` : 'VOTA ORA!'}
        </div>
        <div style={{ display: 'flex', gap: '10px', alignItems: 'center' }}>
          <input
            type="text"
            placeholder="Il tuo nome..."
            value={name}
            onChange={e => setName(e.target.value)}
            style={{
              flex: 1, height: '36px', background: D_PAPER, border: `2px solid ${D_LINE}`,
              color: D_LINE, padding: '0 12px', ...dsBase.body, fontSize: '14px',
              outline: 'none',
            }}
          />
          <button
            onClick={() => castVote(name, 'yes')}
            disabled={loading || !name.trim()}
            style={{
              height: '36px', padding: '0 16px', ...dsBase.display, fontSize: '16px',
              background: NEON_GREEN, color: D_INK, border: `2px solid ${D_LINE}`,
              cursor: name.trim() ? 'pointer' : 'not-allowed',
              boxShadow: `2px 2px 0 ${D_LINE}, 0 0 ${12 * intensity}px ${NEON_GREEN}66`,
              opacity: name.trim() ? 1 : 0.5,
            }}
          >
            CE LA FA!!
          </button>
          <button
            onClick={() => castVote(name, 'no')}
            disabled={loading || !name.trim()}
            style={{
              height: '36px', padding: '0 16px', ...dsBase.display, fontSize: '16px',
              background: palette.primary, color: D_INK, border: `2px solid ${D_LINE}`,
              cursor: name.trim() ? 'pointer' : 'not-allowed',
              boxShadow: `2px 2px 0 ${D_LINE}, 0 0 ${12 * intensity}px ${palette.primary}66`,
              opacity: name.trim() ? 1 : 0.5,
            }}
          >
            NO WAY
          </button>
        </div>
      </div>
    </MangaPanelDark>
  );
}
