  "IRON IV":0,"IRON III":100,"IRON II":200,"IRON I":300,
  "BRONZE IV":400,"BRONZE III":500,"BRONZE II":600,"BRONZE I":700,
  "SILVER IV":800,"SILVER III":900,"SILVER II":1000,"SILVER I":1100,
  "GOLD IV":1200,"GOLD III":1300,"GOLD II":1400,"GOLD I":1500,
  "PLATINUM IV":1600,"PLATINUM III":1700,"PLATINUM II":1800,"PLATINUM I":1900,
  "EMERALD IV":2000,"EMERALD III":2100,"EMERALD II":2200,"EMERALD I":2300,
  "DIAMOND IV":2400,"DIAMOND III":2500,"DIAMOND II":2600,"DIAMOND I":2700,
  "MASTER":2800,"GRANDMASTER":3200,"CHALLENGER":3600,
};

function absLP(tier, rank, lp) {
  const key = rank ? `${tier} ${rank}` : tier;
  return (TIER_BASE[key] || 0) + (lp || 0);
}

function tierFromAbs(abs) {
  const entries = Object.entries(TIER_BASE).sort((a,b) => b[1] - a[1]);
  for (const [key, base] of entries) {
    if (abs >= base) {
      const lp = abs - base;
      const parts = key.split(' ');
      return { tier: parts[0], rank: parts[1] || '', lp, label: parts[1] ? `${parts[0]} ${parts[1]} ${lp} LP` : `${parts[0]} ${lp} LP` };
    }
  }
  return { tier: 'IRON', rank: 'IV', lp: 0, label: 'IRON IV 0 LP' };
}

function daysUntil(target) {
  const ms = Math.max(0, target - new Date());
  return {
    days: Math.floor(ms / 86400000),
    hours: Math.floor((ms % 86400000) / 3600000),
    minutes: Math.floor((ms % 3600000) / 60000),
    seconds: Math.floor((ms % 60000) / 1000),
  };
}

function useCountdown(target) {
  const [v, setV] = React.useState(() => daysUntil(target));
  React.useEffect(() => {
    const t = setInterval(() => setV(daysUntil(target)), 1000);
    return () => clearInterval(t);
  }, [target]);
  return v;
}

function useLiveData(puuid) {
  const [data, setData] = React.useState(null);
  const [error, setError] = React.useState(null);
  const [lastUpdate, setLastUpdate] = React.useState(null);

  const fetchData = React.useCallback(async () => {
    try {
      // Cloudflare Worker — always fresh, 2 min cache, CORS OK
      const res = await fetch(`https://sproporzionato-api.amedeo-shogo.workers.dev/api/data?puuid=${puuid}`, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      if (json.error) throw new Error(json.error);
      setData(json);
      setError(null);
      setLastUpdate(new Date());
      try { localStorage.setItem('ds-cache-' + puuid, JSON.stringify(json)); } catch {}
    } catch (err) {
      // Fallback: GitHub API then local
      try {
        const res2 = await fetch('https://api.github.com/repos/shogo-debug-ctrl/sproporzionato/contents/data.json', {
          headers: { 'Accept': 'application/vnd.github.raw+json' }, cache: 'no-store',
        });
        if (res2.ok) {
          const json = await res2.json();
          setData(json); setError(null); setLastUpdate(new Date());
          try { localStorage.setItem('ds-cache-' + puuid, JSON.stringify(json)); } catch {}
          return;
        }
      } catch {}
      setError(err.message);
      if (!data) {
        try {
          const cached = localStorage.getItem('ds-cache-' + puuid);
          if (cached) { setData(JSON.parse(cached)); setLastUpdate(new Date()); }
        } catch {}
      }
    }
  }, [puuid]);

  React.useEffect(() => {
    fetchData();
    const t = setInterval(fetchData, REFRESH_INTERVAL);
    return () => clearInterval(t);
  }, [fetchData]);

  return { data, error, lastUpdate, refresh: fetchData };
}

// ═══════════════════════════════════════════════════════════════
// PROCESS DATA
// ═══════════════════════════════════════════════════════════════
function processData(raw) {
  const rank = raw.rank;
  const currentAbs = rank ? absLP(rank.tier, rank.rank, rank.lp) : 0;
  const startAbs = absLP("EMERALD", "II", 0);
  const progressPct = Math.min(100, Math.max(0, (currentAbs - startAbs) / (MASTER_ABS - startAbs) * 100));
  const lpToMaster = Math.max(0, MASTER_ABS - currentAbs);

  const matches = raw.matches || [];
  // Use season totals from API (all games, not just last 24)
  const seasonWins = rank ? rank.wins : 0;
  const seasonLosses = rank ? rank.losses : 0;
  const seasonGames = seasonWins + seasonLosses;
  const totalWR = seasonGames ? Math.round(seasonWins / seasonGames * 100) : 0;
  const totalWins = seasonWins;
  const totalGames = seasonGames;

  // Streak
  let streakCount = 0;
  const streakType = matches[0]?.result || 'W';
  for (const m of matches) {
    if (m.result === streakType) streakCount++;
    else break;
  }

  // Champ stats
  const champMap = {};
  for (const m of matches) {
    if (!champMap[m.champ]) champMap[m.champ] = { name: m.champ, games: 0, wins: 0, k: 0, d: 0, a: 0, lp: 0 };
    const s = champMap[m.champ];
    s.games++;
    if (m.result === 'W') s.wins++;
    s.k += m.kills; s.d += m.deaths; s.a += m.assists;
  }
  const champStats = Object.values(champMap).map(s => ({
    ...s,
    wr: Math.round(s.wins / s.games * 100),
    kda: ((s.k + s.a) / Math.max(1, s.d)).toFixed(2),
  })).sort((a, b) => b.games - a.games);

  // MVP (most games champ with highest WR)
  const mvp = champStats.filter(c => c.games >= 2).sort((a, b) => b.wr - a.wr || b.games - a.games)[0] || champStats[0];

  // Role stats
  const roleMap = {};
  for (const m of matches) {
    const r = m.role || 'UNKNOWN';
    if (!roleMap[r]) roleMap[r] = { role: r, games: 0, wins: 0 };
    roleMap[r].games++;
    if (m.result === 'W') roleMap[r].wins++;
  }
  const mainRole = Object.values(roleMap).sort((a, b) => b.games - a.games)[0];

  // Milestones
  const milestones = [
    { tier: "EMERALD II", abs: absLP("EMERALD","II",0) },
    { tier: "EMERALD I",  abs: absLP("EMERALD","I",0) },
    { tier: "DIAMOND IV", abs: absLP("DIAMOND","IV",0) },
    { tier: "DIAMOND III",abs: absLP("DIAMOND","III",0) },
    { tier: "DIAMOND II", abs: absLP("DIAMOND","II",0) },
    { tier: "DIAMOND I",  abs: absLP("DIAMOND","I",0) },
    { tier: "MASTER",     abs: MASTER_ABS },
  ].map(m => ({
    ...m,
    status: currentAbs >= m.abs ? (m.abs === MASTER_ABS ? 'goal' : 'done') : 'future',
  }));
  // Mark current
  const lastDone = milestones.filter(m => m.status === 'done').pop();
  if (lastDone && !milestones.some(m => m.status === 'goal' && currentAbs >= m.abs)) {
    lastDone.status = 'current';
  }
  if (currentAbs >= MASTER_ABS) {
    milestones[milestones.length - 1].status = 'goal';
  }

  const avgKDA = totalGames ? ((matches.reduce((s,m)=>s+m.kills,0) + matches.reduce((s,m)=>s+m.assists,0)) / Math.max(1, matches.reduce((s,m)=>s+m.deaths,0))).toFixed(2) : '0.00';

  return {
    rank, currentAbs, startAbs, progressPct, lpToMaster,
    matches, totalGames, totalWins, totalWR,
    streakCount, streakType, champStats, mvp, mainRole,
    milestones, avgKDA,
  };
}

function useTweaks(defaults) {
  const stored = React.useMemo(() => {
    try { const s=localStorage.getItem('ds-tweaks'); return s?{...defaults,...JSON.parse(s)}:defaults; } catch { return defaults; }
  }, []);
  const [values, setValues] = React.useState(stored);
  const setTweak = React.useCallback((k, v) => {
    const edits = typeof k === 'object' ? k : { [k]: v };
    setValues(prev => { const next={...prev,...edits}; try{localStorage.setItem('ds-tweaks',JSON.stringify(next))}catch{} return next; });
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title='Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x:16, y:16 });
  const clamp = React.useCallback(() => {
    const p=dragRef.current; if(!p) return;
    offsetRef.current = { x:Math.min(Math.max(16,offsetRef.current.x),window.innerWidth-p.offsetWidth-16), y:Math.min(Math.max(16,offsetRef.current.y),window.innerHeight-p.offsetHeight-16) };
    p.style.right=offsetRef.current.x+'px'; p.style.bottom=offsetRef.current.y+'px';
  },[]);
  React.useEffect(()=>{ if(!open)return; clamp(); const ro=new ResizeObserver(clamp); ro.observe(document.documentElement); return ()=>ro.disconnect(); },[open,clamp]);
  const onDrag = (e) => { const p=dragRef.current; if(!p)return; const r=p.getBoundingClientRect(),sx=e.clientX,sy=e.clientY,sr=window.innerWidth-r.right,sb=window.innerHeight-r.bottom; const mv=(ev)=>{offsetRef.current={x:sr-(ev.clientX-sx),y:sb-(ev.clientY-sy)};clamp();}; const up=()=>{window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);}; window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up); };
  return (<><style>{__TWEAKS_STYLE}</style>{!open&&<button className="twk-fab" onClick={()=>setOpen(true)} title="Tweaks">{"\u2699"}</button>}{open&&<div ref={dragRef} className="twk-panel" style={{right:offsetRef.current.x,bottom:offsetRef.current.y}}><div className="twk-hd" onMouseDown={onDrag}><b>{title}</b><button className="twk-x" onMouseDown={e=>e.stopPropagation()} onClick={()=>setOpen(false)}>{"\u2715"}</button></div><div className="twk-body">{children}</div></div>}</>);
}

function TweakRow({label,value,children}){return(<div className="twk-row"><div className="twk-lbl"><span>{label}</span>{value!=null&&<span className="twk-val">{value}</span>}</div>{children}</div>)}

// CHAMPION SPLASH ART — fixed on side margins with parallax
// ═══════════════════════════════════════════════════════════════
function ChampionSplashSides({ player }) {
  const [scrollY, setScrollY] = React.useState(0);
  const [wide, setWide] = React.useState(window.innerWidth > 1200);

  React.useEffect(() => {
    let ticking = false;
    const onScroll = () => {
      if (!ticking) {
        requestAnimationFrame(() => { setScrollY(window.scrollY); ticking = false; });
        ticking = true;
      }
    };
    const onResize = () => setWide(window.innerWidth > 1200);
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onResize);
    return () => { window.removeEventListener('scroll', onScroll); window.removeEventListener('resize', onResize); };
  }, []);

  if (!wide) return null;

  const parallax = scrollY * 0.15;
  const sideW = 'calc((100vw - 1280px) / 2 + 80px)';

  return (
    <>
      {/* Left champion — behind content, clipped to side */}
      <div style={{
        position: 'fixed', top: 0, left: 0, bottom: 0,
        width: sideW, overflow: 'hidden',
        pointerEvents: 'none', zIndex: 0,
      }}>
        <img
          src={player.splashLeft}
          alt=""
          style={{
            position: 'absolute', bottom: `${-parallax}px`, right: '-60%',
            height: '90vh', width: 'auto', maxWidth: 'none',
            opacity: 0.7,
            filter: `brightness(0.75) drop-shadow(0 0 30px ${player.glowLeft})`,
          }}
        />
        <div style={{ position: 'absolute', inset: 0,
          background: 'linear-gradient(to left, #0a0810 0%, transparent 40%)',
        }}/>
      </div>

      {/* Right champion — behind content, clipped to side */}
      <div style={{
        position: 'fixed', top: 0, right: 0, bottom: 0,
        width: sideW, overflow: 'hidden',
        pointerEvents: 'none', zIndex: 0,
      }}>
        <img
          src={player.splashRight}
          alt=""
          style={{
            position: 'absolute', bottom: `${-parallax * 0.8}px`, left: '-60%',
            height: '90vh', width: 'auto', maxWidth: 'none',
            opacity: 0.7,
            filter: `brightness(0.75) drop-shadow(0 0 30px ${player.glowRight})`,
          }}
        />
        <div style={{ position: 'absolute', inset: 0,
          background: 'linear-gradient(to right, #0a0810 0%, transparent 40%)',
        }}/>
      </div>
    </>
  );
}

const LIVE_API_BASE = 'https://sproporzionato-api.amedeo-shogo.workers.dev/api/live';
const DDRAGON_VER = '16.9.1';

// Champion ID → name cache
let champIdMap = null;
async function getChampIdMap() {
  if (champIdMap) return champIdMap;
  try {
    const res = await fetch(`https://ddragon.leagueoflegends.com/cdn/${DDRAGON_VER}/data/en_US/champion.json`);
    const data = await res.json();
    champIdMap = {};
    for (const [name, info] of Object.entries(data.data)) {
      champIdMap[info.key] = name;
    }
    return champIdMap;
  } catch { return {}; }
}

function useLiveGame(puuid) {
  const [live, setLive] = React.useState(null);
  const [champMap, setChampMap] = React.useState({});

  React.useEffect(() => {
    getChampIdMap().then(setChampMap);
    const check = async () => {
      try {
        const res = await fetch(`${LIVE_API_BASE}?puuid=${puuid}`, { cache: 'no-store' });
        if (res.ok) setLive(await res.json());
        else setLive(null);
      } catch {}
    };
    check();
    const t = setInterval(check, 30000);
    return () => clearInterval(t);
  }, [puuid]);

  return { live, champMap };
}

function LiveGameBanner({ palette, intensity, puuid, playerName }) {
  const { live, champMap } = useLiveGame(puuid);

    console.error('LiveGameBanner error:', e);
    return null;
  }
}

function DSStats2({palette,intensity,halftone,tiltAmt,d,playerRole}){
  const matches = d.matches || [];
  const isSupport = playerRole === 'support';

  // CS/min average (or Vision/min for supports)
  const csPerMin = matches.length ? (matches.reduce((s,m) => s + m.cs / Math.max(1, m.durationSec / 60), 0) / matches.length).toFixed(1) : '0.0';
  const visionPerMin = matches.length ? (matches.reduce((s,m) => s + (m.visionScore || 0) / Math.max(1, m.durationSec / 60), 0) / matches.length).toFixed(1) : '0.0';

  // DMG/min average (or Assist/min for supports)
  const dmgPerMin = matches.length ? (matches.reduce((s,m) => s + m.damageDealt / Math.max(1, m.durationSec / 60), 0) / matches.length).toFixed(0) : '0';
  const assistPerMin = matches.length ? (matches.reduce((s,m) => s + m.assists / Math.max(1, m.durationSec / 60), 0) / matches.length).toFixed(1) : '0.0';

  // Kill Participation average
  const kpAvg = matches.length ? Math.round(matches.reduce((s,m) => {
    const tk = m.teamKills || 1;
    return s + ((m.kills + m.assists) / Math.max(1, tk)) * 100;
  }, 0) / matches.length) : 0;

  // WR today
  const today = new Date().toISOString().slice(0, 10);
  const todayMatches = matches.filter(m => m.date && m.date.slice(0, 10) === today);
  const todayWins = todayMatches.filter(m => m.result === 'W').length;
  const todayWR = todayMatches.length ? Math.round(todayWins / todayMatches.length * 100) : null;
  const todaySub = todayMatches.length ? `${todayWins}W \u2014 ${todayMatches.length - todayWins}L oggi` : 'nessuna partita oggi';

  const stat1 = isSupport
    ? { l: 'VISION/MIN', v: visionPerMin, s: parseFloat(visionPerMin) >= 2.5 ? 'WARDKING!!' : parseFloat(visionPerMin) >= 1.5 ? 'buono' : 'mediocre', c: parseFloat(visionPerMin) >= 2.5 ? palette.secondary : parseFloat(visionPerMin) >= 1.5 ? palette.tertiary : palette.primary, t: -1 }
    : { l: 'CS/MIN', v: csPerMin, s: parseFloat(csPerMin) >= 10 ? 'GODLIKE!!' : parseFloat(csPerMin) >= 7.5 ? 'buono' : 'mediocre', c: parseFloat(csPerMin) >= 10 ? palette.secondary : parseFloat(csPerMin) >= 7.5 ? palette.tertiary : palette.primary, t: -1 };

  const stat2 = isSupport
    ? { l: 'ASSIST/MIN', v: assistPerMin, s: parseFloat(assistPerMin) >= 1.0 ? 'playmaker!!' : parseFloat(assistPerMin) >= 0.6 ? 'buono' : 'mediocre', c: parseFloat(assistPerMin) >= 1.0 ? palette.secondary : parseFloat(assistPerMin) >= 0.6 ? palette.tertiary : palette.primary, t: 1 }
    : { l: 'DMG/MIN', v: dmgPerMin, s: parseInt(dmgPerMin) >= 1000 ? 'carry mode!!' : parseInt(dmgPerMin) >= 850 ? 'buono' : 'mediocre', c: parseInt(dmgPerMin) >= 1000 ? palette.secondary : parseInt(dmgPerMin) >= 850 ? palette.tertiary : palette.primary, t: 1 };

  const items = [
    stat1,
    stat2,
    { l: 'KILL PART.', v: `${kpAvg}%`, s: kpAvg >= 65 ? 'ovunque!!' : kpAvg >= 50 ? 'presente' : 'gioca solo', c: '#a86bff', t: -1 },
    { l: 'WR OGGI', v: todayWR !== null ? `${todayWR}%` : '--', s: todaySub, c: todayWR !== null ? (todayWR >= 55 ? NEON_GREEN : palette.primary) : D_DIM, t: 1 },
  ];

  return (
    <div className="ds-stats-grid" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'14px',marginBottom:'24px'}}>
      {items.map((s,i)=>(
        <MangaPanelDark key={i} tilt={s.t*tiltAmt} accent={s.c} intensity={intensity} halftone={halftone} style={{padding:'14px 16px'}}>
          <div style={{position:'relative'}}>
            <div style={{...dsBase.display,fontSize:'11px',letterSpacing:'0.2em',color:s.c}}>{s.l}</div>
            <div style={{...dsBase.display,fontSize:'clamp(32px,4vw,52px)',lineHeight:1,color:s.c,textShadow:`0 0 ${20*intensity}px ${s.c}88, 2px 2px 0 ${D_INK}`,marginTop:'4px'}}>{s.v}</div>
            <div style={{...dsBase.hand,fontSize:'15px',color:D_LINE,marginTop:'2px'}}>{s.s}</div>
          </div>
        </MangaPanelDark>
      ))}
    </div>
  );
}

function DSChart({palette,intensity,d}){
  // Build LP curve from matches (oldest to newest)
  const ordered=[...d.matches].reverse();
  const startAbs=absLP("EMERALD","II",62);
  // We don't have LP per match from API, so show rank progression
  const data=[{abs:startAbs,label:'Start'}];
  // Current position
  data.push({abs:d.currentAbs,label:d.rank?`${d.rank.tier} ${d.rank.rank} ${d.rank.lp}LP`:'Current'});

  const W=720,H=200,PAD={l:50,r:16,t:16,b:24};
  const min=Math.min(startAbs,d.currentAbs)-50;
  const max=MASTER_ABS+50;
  const xs=i=>PAD.l+(i/(data.length-1))*(W-PAD.l-PAD.r);
  const ys=v=>PAD.t+(1-(v-min)/(max-min))*(H-PAD.t-PAD.b);

  // Build curve from match results (approximate LP changes)
  const curveData = [];
  let runningAbs = startAbs;
  curveData.push({ abs: runningAbs, label: 'Start', idx: 0 });
  for (let i = ordered.length - 1; i >= 0; i--) {
    const m = ordered[i];
    runningAbs += m.result === 'W' ? 21 : -17; // approximate LP delta
    curveData.push({ abs: runningAbs, label: `${fmtChamp(m.champ)} ${m.result}`, result: m.result, idx: ordered.length - i });
  }
  // Snap last point to actual rank
  if (curveData.length > 1) curveData[curveData.length-1].abs = d.currentAbs;

  const cMin = Math.min(...curveData.map(p=>p.abs)) - 30;
  const cMax = MASTER_ABS + 30;
  const cxs = i => PAD.l + (i / (curveData.length - 1)) * (W - PAD.l - PAD.r);
  const cys = v => PAD.t + (1 - (v - cMin) / (cMax - cMin)) * (H - PAD.t - PAD.b);
  const path = curveData.map((p,i) => `${i===0?'M':'L'}${cxs(i).toFixed(1)},${cys(p.abs).toFixed(1)}`).join(' ');

  const [hover,setHover]=React.useState(null);

  return(
    <div style={{position:'relative'}}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto'}}>
        <defs>
          <pattern id="anHatchDark" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="3" height="6" fill={palette.secondary} opacity="0.35"/></pattern>
          <filter id="darkGlow"><feGaussianBlur stdDeviation="2.5"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        {[absLP("EMERALD","I",0),absLP("DIAMOND","IV",0),absLP("DIAMOND","II",0),MASTER_ABS].map((v,i)=>(
          <g key={i}><line x1={PAD.l} x2={W-PAD.r} y1={cys(v)} y2={cys(v)} stroke={v===MASTER_ABS?palette.primary:D_DIM} strokeWidth={v===MASTER_ABS?2:0.8} strokeDasharray={v===MASTER_ABS?'0':'3 5'}/><text x={PAD.l-6} y={cys(v)+3} textAnchor="end" style={{fontFamily:'Bangers',fontSize:'11px',fill:v===MASTER_ABS?palette.primary:D_LINE}}>{v===absLP("EMERALD","I",0)?'E1':v===absLP("DIAMOND","IV",0)?'D4':v===absLP("DIAMOND","II",0)?'D2':v===MASTER_ABS?'\u2605 MAS':''}</text></g>
        ))}
        <path d={`${path} L${cxs(curveData.length-1)},${H-PAD.b} L${cxs(0)},${H-PAD.b} Z`} fill="url(#anHatchDark)"/>
        <path d={path} stroke={D_LINE} strokeWidth="3.5" fill="none" strokeLinejoin="round"/>
        <path d={path} stroke={palette.primary} strokeWidth="2" fill="none" strokeLinejoin="round" filter="url(#darkGlow)"/>
        {curveData.map((p,i)=>(
          <g key={i} style={{cursor:'pointer'}} onMouseEnter={()=>setHover(i)} onMouseLeave={()=>setHover(null)}>
            <circle cx={cxs(i)} cy={cys(p.abs)} r="14" fill="transparent"/>
            <circle cx={cxs(i)} cy={cys(p.abs)} r={hover===i?8:(i===curveData.length-1?7:3.5)} fill={p.result==='L'?palette.primary:palette.secondary} stroke={D_LINE} strokeWidth="1.5" filter={(i===curveData.length-1||hover===i)?'url(#darkGlow)':null} style={{transition:'r .15s'}}/>
          </g>
        ))}
      </svg>
      {hover!=null&&curveData[hover]&&<div style={{position:'absolute',left:`${(cxs(hover)/W)*100}%`,top:`${(cys(curveData[hover].abs)/H)*100}%`,transform:'translate(-50%,-120%)',background:D_INK,border:`2px solid ${D_LINE}`,padding:'6px 10px',...dsBase.mono,fontSize:'11px',color:D_LINE,boxShadow:`2px 2px 0 ${D_LINE}`,pointerEvents:'none',whiteSpace:'nowrap',zIndex:10}}>{curveData[hover].label}</div>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// VOTING SYSTEM
// ═══════════════════════════════════════════════════════════════
// Vote storage: GitHub Contents API (public read, token write)
// Token is split to avoid GitHub push protection — repo is public anyway
const VOTE_READ_API = 'https://api.github.com/repos/shogo-debug-ctrl/sproporzionato/contents/votes.json';
const VOTE_REPO = 'shogo-debug-ctrl/sproporzionato';
const _tk = ['ghp','_knYaLQnpjACL8','Gi3w4Leht41','GDj3Cn2COVYx'];
const getVoteToken = () => _tk.join('');

function useVotes() {
  const [votes, setVotes] = React.useState(null);
  const [myVote, setMyVote] = React.useState(() => localStorage.getItem('ds-vote'));
  const [myName, setMyName] = React.useState(() => localStorage.getItem('ds-voter-name') || '');
  const [loading, setLoading] = React.useState(false);
  const [voteError, setVoteError] = React.useState(null);

  const fetchVotes = React.useCallback(async () => {
    try {
      const res = await fetch(VOTE_READ_API, {
        headers: { 'Accept': 'application/vnd.github.raw+json' },
        cache: 'no-store',
      });
      if (res.ok) {
        const d = await res.json();
        setVotes(d);
        setVoteError(null);
        try { localStorage.setItem('ds-votes-cache', JSON.stringify(d)); } catch {}
      }
    } catch {
      try { const c = localStorage.getItem('ds-votes-cache'); if (c) setVotes(JSON.parse(c)); } catch {}
    }
  }, []);

  React.useEffect(() => { fetchVotes(); const t = setInterval(fetchVotes, 30000); return () => clearInterval(t); }, [fetchVotes]);

  const castVote = React.useCallback(async (name, vote) => {
    if (!name.trim()) return;
    setLoading(true);
    setVoteError(null);
    // Retry loop to handle SHA conflicts
    for (let attempt = 0; attempt < 3; attempt++) {
      try {
        // 1. Get current file with fresh SHA (use auth to avoid rate limit)
        const fileRes = await fetch(
          `https://api.github.com/repos/${VOTE_REPO}/contents/votes.json?t=${Date.now()}`,
          { headers: { 'Authorization': 'token ' + getVoteToken(), 'Accept': 'application/vnd.github+json' }, cache: 'no-store' }
        );
        const fileData = await fileRes.json();
        const currentContent = JSON.parse(atob(fileData.content));
        const sha = fileData.sha;

        // 2. Update votes
        currentContent.votes = currentContent.votes || {};
        currentContent.votes[name.trim()] = vote;
        const entries = Object.values(currentContent.votes);
        currentContent.total_yes = entries.filter(v => v === 'yes').length;
        currentContent.total_no = entries.filter(v => v === 'no').length;

        // 3. Write back
        const writeRes = await fetch(
          `https://api.github.com/repos/${VOTE_REPO}/contents/votes.json`,
          {
            method: 'PUT',
            headers: {
              'Authorization': 'token ' + getVoteToken(),
              'Accept': 'application/vnd.github+json',
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              message: `Vote: ${name.trim()} -> ${vote}`,
              content: btoa(unescape(encodeURIComponent(JSON.stringify(currentContent, null, 2)))),
              sha: sha,
            }),
          }
        );
        if (writeRes.ok || writeRes.status === 200) {
          setVotes(currentContent);
          setMyVote(vote);
          setMyName(name.trim());
          localStorage.setItem('ds-vote', vote);
          localStorage.setItem('ds-voter-name', name.trim());
          try { localStorage.setItem('ds-votes-cache', JSON.stringify(currentContent)); } catch {}
          setTimeout(fetchVotes, 10000);
          break; // Success
        }
        // SHA conflict — retry
        if (writeRes.status === 409 && attempt < 2) {
          await new Promise(r => setTimeout(r, 1000));
          continue;
        }
        const err = await writeRes.json();
        throw new Error(err.message || 'Write failed');
      } catch (err) {
        if (attempt === 2) {
          console.error('Vote error:', err);
          setVoteError('Errore: ' + err.message);
        }
      }
    }
    setLoading(false);
  }, [fetchVotes]);

  return { votes, myVote, myName, castVote, loading, refresh: fetchVotes, voteError };
}

function PlayerSelector({ onSelect, visible, onClose }) {
  const [ranks, setRanks] = React.useState({});

  React.useEffect(() => {
    if (!visible) return;
    PLAYERS.forEach(async (p) => {
      try {
        const res = await fetch(`https://sproporzionato-api.amedeo-shogo.workers.dev/api/data?puuid=${p.puuid}`, { cache: 'no-store' });
        if (res.ok) {
          const json = await res.json();
          if (json.rank) {
            setRanks(prev => ({ ...prev, [p.id]: json.rank }));
          }
        }
      } catch {}
    });
  }, [visible]);

  if (!visible) return null;

  return (
    <>
      <style>{__SELECTOR_STYLE}</style>
      <div className="ps-overlay" onClick={onClose}>

                <div key={p.id} className="ps-card" style={{ animationDelay: `${i * 0.08}s` }} onClick={() => onSelect(p.id)}>

}

// COMPARISON VIEW
// ═══════════════════════════════════════════════════════════════
function ComparisonView({ palette, intensity }) {
  const [allData, setAllData] = React.useState({});
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    let cancelled = false;
    setLoading(true);
    Promise.all(PLAYERS.map(async (p) => {
      try {
        const res = await fetch(`https://sproporzionato-api.amedeo-shogo.workers.dev/api/data?puuid=${p.puuid}`, { cache: 'no-store' });
        if (res.ok) {
          const json = await res.json();
          return { id: p.id, raw: json, processed: processData(json) };
        }
      } catch {}
      return { id: p.id, raw: null, processed: null };
    })).then(results => {
      if (cancelled) return;
      const map = {};
      results.forEach(r => { map[r.id] = r; });
      setAllData(map);
      setLoading(false);
    });
    return () => { cancelled = true; };
  }, []);

  if (loading) return <LoadingScreen/>;

  const rows = [
    { label: 'RANK', get: (d) => d?.raw?.rank ? `${d.raw.rank.tier} ${d.raw.rank.rank || ''}`.trim() : '--', best: (vals) => { const order = Object.keys(TIER_BASE); return vals.indexOf(vals.reduce((best,v,i) => { const a = allData[PLAYERS[i].id]?.processed?.currentAbs || 0; const b = allData[PLAYERS[vals.indexOf(best) < 0 ? 0 : vals.indexOf(best)].id]?.processed?.currentAbs || 0; return a > b ? v : best; }, vals[0])); }},
    { label: 'LP', get: (d) => d?.raw?.rank ? String(d.raw.rank.lp) : '--', best: (vals) => { let maxI = 0; vals.forEach((v,i) => { if (parseInt(v) > parseInt(vals[maxI])) maxI = i; }); return maxI; }},
    { label: 'WIN RATE', get: (d) => { if (!d?.processed) return '--'; return `${d.processed.totalWR}%`; }, best: (vals) => { let maxI = 0; vals.forEach((v,i) => { if (parseInt(v) > parseInt(vals[maxI])) maxI = i; }); return maxI; }},
    { label: 'KDA', get: (d) => d?.processed?.avgKDA || '--', best: (vals) => { let maxI = 0; vals.forEach((v,i) => { if (parseFloat(v) > parseFloat(vals[maxI])) maxI = i; }); return maxI; }},
    { label: 'STREAK', get: (d) => d?.processed ? `${d.processed.streakCount}x${d.processed.streakType}` : '--', best: (vals) => { let maxI = 0; vals.forEach((v,i) => { const p = allData[PLAYERS[i].id]?.processed; const best = allData[PLAYERS[maxI].id]?.processed; if (p && best && p.streakType === 'W' && p.streakCount > (best.streakType === 'W' ? best.streakCount : 0)) maxI = i; }); return maxI; }},
    { label: 'LP TO MASTER', get: (d) => d?.processed ? String(d.processed.lpToMaster) : '--', best: (vals) => { let minI = 0; vals.forEach((v,i) => { if (parseInt(v) < parseInt(vals[minI]) && v !== '--') minI = i; }); return minI; }},
    { label: 'PROGRESS %', get: (d) => d?.processed ? `${Math.round(d.processed.progressPct)}%` : '--', best: (vals) => { let maxI = 0; vals.forEach((v,i) => { if (parseInt(v) > parseInt(vals[maxI])) maxI = i; }); return maxI; }},
    { label: 'GAMES', get: (d) => d?.processed ? String(d.processed.totalGames) : '--', best: (vals) => { let maxI = 0; vals.forEach((v,i) => { if (parseInt(v) > parseInt(vals[maxI])) maxI = i; }); return maxI; }},
  ];

  return (
    <MangaPanelDark accent={palette.primary} intensity={intensity} style={{ padding: '24px', marginBottom: '24px' }}>
      <div style={{ ...dsBase.display, fontSize: '28px', color: D_LINE, marginBottom: '20px', textAlign: 'center' }}>
        CONFRONTO!! <span style={{ color: palette.primary, textShadow: `0 0 12px ${palette.primary}66` }}>// TUTTI I PLAYER</span>
      </div>

      <div style={{ overflowX: 'auto' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', tableLayout: 'fixed' }}>
          <thead>
            <tr>
              <th style={{ ...dsBase.display, fontSize: '12px', color: D_DIM, letterSpacing: '0.15em', padding: '10px 8px', textAlign: 'left', borderBottom: `2px solid ${D_LINE}`, width: '100px' }}></th>
              {PLAYERS.map(p => (
                <th key={p.id} style={{ ...dsBase.display, fontSize: '14px', color: palette.secondary, padding: '10px 8px', textAlign: 'center', borderBottom: `2px solid ${D_LINE}`, textShadow: `0 0 8px ${palette.secondary}44`, whiteSpace: 'nowrap' }}>
                  {p.name.replace('!','')}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {rows.map((row, ri) => {
              const vals = PLAYERS.map(p => row.get(allData[p.id]));
              const bestIdx = row.best(vals);
              return (
                <tr key={ri} style={{ background: ri % 2 === 0 ? D_INK : 'rgba(255,255,255,0.02)' }}>
                  <td style={{ ...dsBase.display, fontSize: '11px', color: D_DIM, letterSpacing: '0.1em', padding: '10px 8px', borderBottom: `1px solid ${D_DIM}33` }}>{row.label}</td>
                  {vals.map((v, vi) => (
                    <td key={vi} style={{
                      ...dsBase.display, fontSize: '16px', textAlign: 'center', padding: '10px 6px',
                      borderBottom: `1px solid ${D_DIM}33`,
                      color: vi === bestIdx ? NEON_GREEN : D_LINE,
                      textShadow: vi === bestIdx ? `0 0 12px ${NEON_GREEN}88` : 'none',
                    }}>{v}</td>
                  ))}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </MangaPanelDark>
  );
}

  const pageBg = `radial-gradient(circle at 0 0,${palette.secondary}24 0%,transparent 30%),radial-gradient(circle at 100% 100%,${palette.primary}29 0%,transparent 35%),radial-gradient(circle at 50% 50%,${palette.tertiary}10 0%,transparent 60%)`;

  return(
    <div style={{minHeight:'100vh',background:D_INK,backgroundImage:pageBg,color:D_LINE,...dsBase.body}}>
      <style>{`@keyframes dsPulse{0%,100%{transform:rotate(15deg) scale(1)}50%{transform:rotate(15deg) scale(1.12)}}`}</style>

      {/* Player Selector Popup */}
      <PlayerSelector visible={selectorOpen} onSelect={handleSelect} onClose={() => { if (selectedId) setSelectorOpen(false); }}/>

      {/* Champion splash art disabled for now */}

      <div className="ds-container" style={{maxWidth:'1280px',margin:'0 auto',padding:compact?'24px 32px':'36px 44px 48px',boxSizing:'border-box',position:'relative',zIndex:1}}>

        {/* Top bar with player switcher */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}}>
          <button onClick={() => setSelectorOpen(true)} style={{
            background:'rgba(255,210,58,0.1)',border:`2px solid ${palette.secondary}`,color:palette.secondary,
            padding:'6px 16px',cursor:'pointer',...dsBase.display,fontSize:'14px',letterSpacing:'0.1em',
            boxShadow:`0 0 12px ${palette.secondary}33`,transition:'transform .2s,box-shadow .2s',
          }} onMouseEnter={e=>{e.target.style.transform='scale(1.05)';e.target.style.boxShadow=`0 0 20px ${palette.secondary}55`}} onMouseLeave={e=>{e.target.style.transform='scale(1)';e.target.style.boxShadow=`0 0 12px ${palette.secondary}33`}}>
            {"\u2605"} {isCompare ? 'CONFRONTO' : player.name} {"\u00B7"} CAMBIA PLAYER
          </button>
          <div style={{...dsBase.mono,fontSize:'11px',color:D_DIM}}>
            {PLAYERS.length} player registrati
          </div>
        </div>

        {isCompare ? (
          <ComparisonView palette={palette} intensity={intensity}/>
        ) : (
          <PlayerDashboard player={player} tweaks={t} setTweak={setTweak}/>
        )}
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Accent palette"/>
        <TweakSelect label="Color" value={t.accent} options={['red','blue','yellow','green','purple']} onChange={v=>setTweak('accent',v)}/>
        <TweakSection label="Mood"/>
        <TweakSlider label="Glow intensity" value={t.intensity} min={0} max={2} step={0.1} onChange={v=>setTweak('intensity',v)}/>
        <TweakSlider label="Panel tilt" value={t.tilt} min={0} max={3} step={0.1} onChange={v=>setTweak('tilt',v)}/>
        <TweakSection label="FX"/>
        <TweakToggle label="Halftone dots" value={t.halftone} onChange={v=>setTweak('halftone',v)}/>
        <TweakToggle label="Speed lines" value={t.speedLines} onChange={v=>setTweak('speedLines',v)}/>
        <TweakToggle label="BOOM!! fx" value={t.soundFx} onChange={v=>setTweak('soundFx',v)}/>
        <TweakToggle label="Streak badge" value={t.showStreak} onChange={v=>setTweak('showStreak',v)}/>
        <TweakSection label="Layout"/>
        <TweakToggle label="Compact mode" value={t.compactMode} onChange={v=>setTweak('compactMode',v)}/>
        <TweakSlider label="Battle log size" value={t.matchCount} min={5} max={24} step={1} unit=" games" onChange={v=>setTweak('matchCount',v)}/>
      </TweaksPanel>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  render() {
    if (this.state.error) return (
      <div style={{minHeight:'100vh',background:'#0a0810',color:'#e8e0f0',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',fontFamily:'monospace',padding:'40px'}}>
        <h1 style={{color:'#ff2e5b',fontSize:'24px',marginBottom:'16px'}}>ERRORE DI RENDERING</h1>
        <p style={{color:'#a090c0',marginBottom:'24px'}}>{this.state.error.message}</p>
        <button onClick={() => { localStorage.removeItem('ds-selected-player'); window.location.reload(); }}
          style={{background:'#ff2e5b',color:'#fff',border:'none',padding:'12px 24px',cursor:'pointer',fontSize:'16px'}}>
          RICARICA
        </button>
      </div>
    );
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><DarkShonenApp/></ErrorBoundary>);
</script>
</body>
</html>
